<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Screen body -->
  <rect x="16" y="22" width="96" height="66" rx="8" ry="8" fill="#6366f1"/>
  <!-- Screen inner (bezel) -->
  <rect x="24" y="30" width="80" height="50" rx="4" ry="4" fill="#0f1117"/>
  <!-- Code lines on screen -->
  <rect x="32" y="40" width="28" height="4" rx="2" fill="#6366f1" opacity="0.9"/>
  <rect x="36" y="50" width="40" height="4" rx="2" fill="#818cf8" opacity="0.7"/>
  <rect x="36" y="60" width="32" height="4" rx="2" fill="#818cf8" opacity="0.7"/>
  <rect x="32" y="70" width="20" height="4" rx="2" fill="#6366f1" opacity="0.9"/>
  <!-- Cursor blink -->
  <rect x="56" y="70" width="6" height="4" rx="1" fill="#a5b4fc"/>
  <!-- Base / hinge -->
  <rect x="40" y="88" width="48" height="5" rx="2" fill="#4f46e5"/>
  <!-- Bottom base -->
  <rect x="10" y="93" width="108" height="8" rx="4" fill="#6366f1"/>
  <!-- Trackpad cutout hint -->
  <rect x="52" y="95" width="24" height="4" rx="2" fill="#4f46e5"/>
</svg>
